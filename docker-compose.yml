services:
  mongodb:
    image: mongo:7
    container_name: magic-garden-db
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: magic-garden-backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=magic_garden
      - JWT_SECRET=magic-garden-secret-key-2024
      - CORS_ORIGINS=*

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: magic-garden-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80"
