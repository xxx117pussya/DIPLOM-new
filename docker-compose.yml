services:
  mongodb:
    image: public.ecr.aws/docker/library/mongo:7
    container_name: magic-garden-db
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: ./backend/Dockerfile
    container_name: magic-garden-backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=magic_garden
      - JWT_SECRET=magic-garden-secret-key-2024
      - CORS_ORIGINS=http://localhost,http://localhost:80

  frontend:
    build:
      context: ./frontend
      dockerfile: ./frontend/Dockerfile
    container_name: magic-garden-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mongo_data:
